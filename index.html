<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Springer 2026 Conference</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background: linear-gradient(270deg, #ff7e5f, #feb47b);
            background-size: 200% 200%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        header {
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        h1 {
            color: #D63E30;
            font-size: 2.5em;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }
        .cards {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin: 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            margin: 10px;
            padding: 20px;
            width: 30%;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        footer {
            padding: 10px;
            text-align: center;
            background: #333;
            color: white;
            position: relative;
            clear: both;
        }
        h2 {
            text-decoration: underline;
            color: #D63E30;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Springer 2026 Conference</h1>
    </header>
    <section class="hero">
        <h2>Featured Statistics</h2>
        <p>Join us for an unforgettable experience!</p>
    </section>
    <div class="cards">
        <div class="card">
            <h2>Schedule Event 1</h2>
            <p>Details about the event.</p>
        </div>
        <div class="card">
            <h2>Schedule Event 2</h2>
            <p>Details about the event.</p>
        </div>
        <div class="card">
            <h2>Schedule Event 3</h2>
            <p>Details about the event.</p>
        </div>
    </div>
    <footer>
        <p>© 2026 Springer Conference</p>
    </footer>
</body>
</html>
